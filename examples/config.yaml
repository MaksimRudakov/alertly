server:
  listen_addr: ":8080"
  read_timeout: 10s
  write_timeout: 30s
  shutdown_timeout: 30s
  max_body_bytes: 1048576

telegram:
  api_url: "https://api.telegram.org"
  parse_mode: "HTML"
  request_timeout: 10s
  rate_limit:
    per_chat_per_sec: 1
    global_per_sec: 30
  retry:
    max_attempts: 5
    initial_backoff: 1s
    max_backoff: 60s

templates:
  default: |
    {{ severity_emoji .Severity }} <b>{{ escape_html .Title }}</b>
    {{ if .Body }}{{ escape_html .Body }}{{ end }}
    {{- range .Links }}
    <a href="{{ .URL }}">{{ escape_html .Title }}</a>{{ end }}
  alertmanager: |
    <b>{{ escape_html .Title }}</b>
    <b>Status:</b> {{ if eq .Status "firing" }}Firing 🔥{{ else if eq .Status "resolved" }}Resolved ✅{{ else }}{{ escape_html .Status }}{{ end }}
    {{- if .Body }}
    {{ escape_html .Body }}
    {{- end }}
    {{- range .Links }}
    <a href="{{ .URL }}">{{ escape_html .Title }} URL</a>
    {{- end }}

    <b>Alert Name:</b> {{ escape_html (index .Labels "alertname") }}
    <b>Severity:</b> {{ .Severity }} {{ severity_emoji .Severity }}
  kubewatch: |
    {{ severity_emoji .Severity }} <b>{{ escape_html .Title }}</b>
    {{ if .Body }}{{ escape_html .Body }}{{ end }}

logging:
  level: "info"
  format: "json"

# Interactive callbacks (long polling) and Alertmanager silence integration.
# Leave disabled unless on-call needs in-chat silence buttons.
updates:
  enabled: false
  poll_timeout: 30s
  # chat_allowlist: chats allowed to trigger silence actions. Empty = disabled.
  chat_allowlist: []
  # user_allowlist: optional. Empty = any user in an allowlisted chat.
  user_allowlist: []
  silence_durations: ["1h", "4h", "24h"]
  label_cache_ttl: 48h
  label_cache_max: 10000
  # button_ttl: how long silence buttons stay active on an alert message.
  # After this window the inline keyboard is removed and late clicks are rejected.
  # Allowed range: 2h..48h.
  button_ttl: 8h

alertmanager:
  url: ""                 # e.g. http://alertmanager.monitoring.svc:9093
  request_timeout: 10s
  # Auth via env (optional):
  #   ALERTMANAGER_AUTH_USERNAME + ALERTMANAGER_AUTH_PASSWORD (basic), or
  #   ALERTMANAGER_AUTH_TOKEN (bearer).
