# Production-ish values for the alertly chart.
#
# Install:
#   helm install alertly alertly/alertly \
#     --namespace monitoring-system --create-namespace \
#     --version 0.3.0 \
#     -f examples/values-production.yaml
#
# Prerequisites:
#   - A Secret named `alertly-tokens` in the release namespace with keys
#     TELEGRAM_BOT_TOKEN and WEBHOOK_AUTH_TOKEN — typically provisioned by
#     external-secrets, sealed-secrets, or vault-csi.
#   - stakater/Reloader installed in the cluster (for `reloader.enabled`).
#   - Prometheus Operator CRDs (kube-prometheus-stack) installed for
#     `metrics.serviceMonitor.enabled` — rendering fails without them.

replicaCount: 1

image:
  repository: ghcr.io/maksimrudakov/alertly
  pullPolicy: IfNotPresent
  # Pin to a concrete tag in prod; do not rely on `latest`.
  tag: ""

# Keep tokens out of Helm history — use an externally-managed Secret.
secret:
  create: false
  existingSecret: alertly-tokens
  keys:
    botToken: TELEGRAM_BOT_TOKEN
    webhookAuth: WEBHOOK_AUTH_TOKEN

# Auto-restart the Deployment on ConfigMap/Secret content changes.
reloader:
  enabled: true

env:
  LOG_LEVEL: info

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Effective only with replicaCount > 1 — with a single replica there is nothing
# to spread. Uncomment if you scale out (see replicaCount dedup caveats first).
# topologySpreadConstraints:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: alertly

# maxUnavailable: 0 protects the per-pod dedup window from voluntary evictions.
# Caveat: with replicaCount: 1 it blocks node drain until manual intervention.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 0

metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    # Adjust to match your Prometheus operator's serviceMonitorSelector.
    additionalLabels:
      release: kube-prometheus-stack

# Escape hatch for artifacts the chart does not template natively
# (e.g. NetworkPolicy). PDB and Prometheus scraping use the native
# `podDisruptionBudget` / `metrics.serviceMonitor` blocks above.
extraManifests:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: alertly
    spec:
      podSelector:
        matchLabels:
          app.kubernetes.io/name: alertly
      policyTypes: [Ingress, Egress]
      ingress:
        # Allow Alertmanager and Kubewatch (both in monitoring-system) to post webhooks.
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: monitoring-system
          ports:
            - protocol: TCP
              port: 8080
      egress:
        # Cluster DNS.
        - to:
            - namespaceSelector: {}
              podSelector:
                matchLabels:
                  k8s-app: kube-dns
          ports:
            - protocol: UDP
              port: 53
            - protocol: TCP
              port: 53
        # Telegram Bot API. CIDR is coarse because Telegram does not publish a stable IP range;
        # tighten with a ServiceEntry/egress-gateway if your platform supports hostname egress.
        - to:
            - ipBlock:
                cidr: 0.0.0.0/0
          ports:
            - protocol: TCP
              port: 443
