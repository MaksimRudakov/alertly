version: 2
project_name: alertly

before:
  hooks:
    - go mod tidy

builds:
  - id: alertly
    main: ./cmd/alertly
    binary: alertly
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/MaksimRudakov/alertly/internal/version.Version={{ .Version }}
      - -X github.com/MaksimRudakov/alertly/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/MaksimRudakov/alertly/internal/version.Date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: alertly
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - examples/**/*

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug fixes
      regexp: "^fix"
      order: 1
    - title: Documentation
      regexp: "^docs"
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^test"
      - "^ci"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  mode: replace
  footer: |
    ---
    Container image: `ghcr.io/maksimrudakov/alertly:{{ .Tag }}` (multi-arch, signed via cosign keyless).
