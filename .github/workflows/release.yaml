name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/alertly
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          provenance: true
          sbom: true
      - uses: sigstore/cosign-installer@v3
      - name: Sign image with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGES: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for tag in $IMAGES; do
            cosign sign --yes "${tag}@${DIGEST}"
          done
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/alertly@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: true

  detect-charts:
    runs-on: ubuntu-latest
    outputs:
      has_charts: ${{ steps.check.outputs.has_charts }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if compgen -G "charts/*/Chart.yaml" > /dev/null; then
            echo "has_charts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_charts=false" >> "$GITHUB_OUTPUT"
            echo "No charts/*/Chart.yaml found; chart-release will be skipped."
          fi

  chart-release:
    runs-on: ubuntu-latest
    needs: [docker, detect-charts]
    if: needs.detect-charts.outputs.has_charts == 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.0
      - uses: sigstore/cosign-installer@v3
      - uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign chart tarballs (cosign keyless) and attach signatures to GitHub Release
        env:
          COSIGN_EXPERIMENTAL: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for chart in charts/*/; do
            name=$(basename "$chart")
            version=$(grep '^version:' "$chart/Chart.yaml" | awk '{print $2}')
            tag="${name}-${version}"
            tgz="/tmp/${tag}.tgz"
            helm package "$chart" -d /tmp
            cosign sign-blob --yes \
              --output-signature "${tgz}.sig" \
              --output-certificate "${tgz}.pem" \
              "${tgz}"
            # skip_existing=true may have skipped the release; only upload if it exists
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release upload "$tag" \
                "${tgz}.sig" "${tgz}.pem" \
                --repo "$GITHUB_REPOSITORY" --clobber
            fi
          done
      - name: Push chart to OCI (ghcr.io) and sign with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          helm registry login ghcr.io -u "$GITHUB_ACTOR" -p "${{ secrets.GITHUB_TOKEN }}"
          for chart in charts/*/; do
            name=$(basename "$chart")
            version=$(grep '^version:' "$chart/Chart.yaml" | awk '{print $2}')
            tgz="/tmp/${name}-${version}.tgz"
            push_out=$(helm push "${tgz}" "oci://ghcr.io/${{ github.repository_owner }}/charts" 2>&1 | tee /dev/stderr)
            digest=$(printf '%s' "$push_out" | grep -oE 'sha256:[a-f0-9]{64}' | head -n1)
            cosign sign --yes "ghcr.io/${{ github.repository_owner }}/charts/${name}@${digest}"
          done
