name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/alertly
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          provenance: true
          sbom: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGES: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for tag in $IMAGES; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

  detect-charts:
    runs-on: ubuntu-latest
    outputs:
      has_charts: ${{ steps.check.outputs.has_charts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: check
        run: |
          if compgen -G "charts/*/Chart.yaml" > /dev/null; then
            echo "has_charts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_charts=false" >> "$GITHUB_OUTPUT"
            echo "No charts/*/Chart.yaml found; chart-release will be skipped."
          fi

  chart-release:
    runs-on: ubuntu-latest
    needs: [docker, detect-charts]
    if: needs.detect-charts.outputs.has_charts == 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign chart tarballs (cosign keyless) and attach signatures to GitHub Release
        env:
          COSIGN_EXPERIMENTAL: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for chart in charts/*/; do
            name=$(basename "$chart")
            version=$(grep '^version:' "$chart/Chart.yaml" | awk '{print $2}')
            tag="${name}-${version}"
            tgz="/tmp/${tag}.tgz"
            helm package "$chart" -d /tmp
            cosign sign-blob --yes \
              --output-signature "${tgz}.sig" \
              --output-certificate "${tgz}.pem" \
              "${tgz}"
            # skip_existing=true may have skipped the release; only upload if it exists
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release upload "$tag" \
                "${tgz}.sig" "${tgz}.pem" \
                --repo "$GITHUB_REPOSITORY" --clobber
            fi
          done
      - name: Push chart to OCI (ghcr.io) and sign with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          # ghcr.io requires a lowercase repository path; github.repository_owner
          # preserves the original casing, so lower-case it explicitly.
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm registry login ghcr.io -u "$GITHUB_ACTOR" -p "${{ secrets.GITHUB_TOKEN }}"
          for chart in charts/*/; do
            name=$(basename "$chart")
            version=$(grep '^version:' "$chart/Chart.yaml" | awk '{print $2}')
            tgz="/tmp/${name}-${version}.tgz"
            push_out=$(helm push "${tgz}" "oci://ghcr.io/${owner_lc}/charts" 2>&1 | tee /dev/stderr)
            digest=$(printf '%s' "$push_out" | grep -oE 'sha256:[a-f0-9]{64}' | head -n1)
            cosign sign --yes "ghcr.io/${owner_lc}/charts/${name}@${digest}"
          done
