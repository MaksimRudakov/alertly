name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          files: coverage.out
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: CGO_ENABLED=0 go build -trimpath -o /tmp/alertly ./cmd/alertly

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-file: go.mod
          go-package: ./...

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: alertly:ci
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            DATE=ci
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: alertly:ci
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  chart-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.0
      - name: helm lint
        run: helm lint charts/alertly
      - name: helm template (defaults)
        run: |
          helm template test charts/alertly \
            --set secret.values.telegramBotToken=ci \
            --set secret.values.webhookAuthToken=ci > /tmp/rendered.yaml
      - name: helm template (ingress + reloader + extraManifests)
        run: |
          helm template test charts/alertly \
            --set secret.values.telegramBotToken=ci \
            --set secret.values.webhookAuthToken=ci \
            --set ingress.enabled=true \
            --set reloader.enabled=true > /tmp/rendered-full.yaml
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install helm-docs
        run: go install github.com/norwoodj/helm-docs/cmd/helm-docs@latest
      - name: helm-docs check (charts/alertly/README.md must be up to date)
        run: |
          helm-docs --chart-search-root=charts
          if ! git diff --exit-code charts/ ; then
            echo "::error::charts/alertly/README.md is stale. Run 'helm-docs --chart-search-root=charts' locally and commit."
            exit 1
          fi

  chart-install:
    runs-on: ubuntu-latest
    needs: chart-lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build image
        run: |
          docker build -t alertly:ci \
            --build-arg VERSION=ci \
            --build-arg COMMIT=${{ github.sha }} \
            --build-arg DATE=ci .
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: alertly-ci
      - name: Load image into kind
        run: kind load docker-image alertly:ci --name alertly-ci
      - name: helm install
        run: |
          helm install alertly ./charts/alertly \
            --set image.repository=alertly \
            --set image.tag=ci \
            --set image.pullPolicy=IfNotPresent \
            --set secret.values.telegramBotToken=dummy \
            --set secret.values.webhookAuthToken=dummy0123456789dummy0123456789aa \
            --set env.DRY_RUN=true \
            --wait --timeout 120s
      - name: rollout status
        run: kubectl rollout status deployment/alertly --timeout=120s
      - name: Probe /healthz and /readyz
        run: |
          kubectl run curl --image=curlimages/curl:8.10.1 --rm -i --restart=Never -- \
            sh -c 'curl -sf http://alertly.default.svc:8080/healthz && curl -sf http://alertly.default.svc:8080/readyz'
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -o wide || true
          kubectl describe deployment alertly || true
          kubectl logs deployment/alertly --tail=100 || true
