name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: CGO_ENABLED=0 go build -trimpath -o /tmp/alertly ./cmd/alertly

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: alertly:ci
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            DATE=ci
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: alertly:ci
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  chart-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.0
      - name: helm lint
        run: helm lint charts/alertly
      - name: helm template (defaults)
        run: |
          helm template test charts/alertly \
            --set secret.values.telegramBotToken=ci \
            --set secret.values.webhookAuthToken=ci > /tmp/rendered.yaml
      - name: helm template (ingress + reloader + extraManifests)
        run: |
          helm template test charts/alertly \
            --set secret.values.telegramBotToken=ci \
            --set secret.values.webhookAuthToken=ci \
            --set ingress.enabled=true \
            --set reloader.enabled=true > /tmp/rendered-full.yaml
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install helm-docs
        run: go install github.com/norwoodj/helm-docs/cmd/helm-docs@latest
      - name: helm-docs check (charts/alertly/README.md must be up to date)
        run: |
          helm-docs --chart-search-root=charts
          if ! git diff --exit-code charts/ ; then
            echo "::error::charts/alertly/README.md is stale. Run 'helm-docs --chart-search-root=charts' locally and commit."
            exit 1
          fi
